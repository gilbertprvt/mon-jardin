<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mon Jardin</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Georgia, serif; }
.page {
  background: linear-gradient(160deg, #1a4a1a 0%, #2d6a2d 40%, #4a8c3f 70%, #6aab5a 100%);
  min-height: 100vh;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.feuilles { font-size: 40px; margin-bottom: 10px; }
h1 { font-size: 48px; color: #f0ffe0; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); margin-bottom: 8px; font-style: italic; }
.slogan { font-size: 18px; color: #c8f0a0; margin-bottom: 30px; font-style: italic; }
.carte {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 16px;
  padding: 28px 32px;
  max-width: 620px;
  width: 100%;
  margin-bottom: 24px;
  color: #f0ffe0;
}
.carte h2 { font-size: 20px; color: #c8f0a0; margin-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; }
.carte p { font-size: 15px; line-height: 1.8; color: #e8f8d0; }
.ia-ligne { display: flex; align-items: center; gap: 12px; margin: 10px 0; }
.ia-badge { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 6px 14px; font-size: 14px; color: #f0ffe0; border: 1px solid rgba(255,255,255,0.2); text-decoration: none; }
.ia-badge:hover { background: rgba(255,255,255,0.25); }
.pourcentage { font-weight: bold; color: #c8f0a0; font-size: 16px; min-width: 40px; }
.barre { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.15); flex: 1; overflow: hidden; }
.barre-inner { height: 100%; border-radius: 4px; background: #90d060; }
.garanties { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.garantie { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 24px; padding: 8px 20px; color: #f0ffe0; font-size: 14px; }
.btn { background: #4a8c3f; border: 2px solid #c8f0a0; border-radius: 32px; padding: 14px 40px; color: #f0ffe0; font-size: 18px; font-family: Georgia, serif; cursor: pointer; font-style: italic; text-decoration: none; display: inline-block; }
.btn:hover { background: #6aab5a; }
</style>
</head>
<body>
<div class="page">
  <div class="feuilles">🌿 🌱 🌿</div>
  <h1>Mon Jardin</h1>
  <p class="slogan">Votre compagnon de jardinage</p>

  <div class="carte">
    <h2>Créé grâce à l'Intelligence Artificielle</h2>
    <p style="margin-bottom:14px">Ce logiciel a été entièrement réalisé avec l'aide de deux intelligences artificielles :</p>
    <div class="ia-ligne">
      <span class="pourcentage">20%</span>
      <div class="barre"><div class="barre-inner" style="width:20%"></div></div>
      <a class="ia-badge" href="https://mistral.ai" target="_blank">Mistral ↗</a>
    </div>
    <div class="ia-ligne">
      <span class="pourcentage">80%</span>
      <div class="barre"><div class="barre-inner" style="width:80%"></div></div>
      <a class="ia-badge" href="https://anthropic.com" target="_blank">Anthropic ↗</a>
    </div>
  </div>

  <div class="garanties">
    <div class="garantie">✓ Entièrement gratuit</div>
    <div class="garantie">✓ Sans publicité</div>
    <div class="garantie">✓ Sans virus</div>
  </div>

  <a class="btn" href="jardin_telechargement.html">Découvrir et télécharger →</a>
</div>
</body>
</html>
